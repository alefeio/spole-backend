name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-lint-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: spole
          POSTGRES_PASSWORD: spole
          POSTGRES_DB: spole
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U spole -d spole"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    env:
      NODE_ENV: test
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_USER: spole
      POSTGRES_PASSWORD: spole
      POSTGRES_DB: spole
      REDIS_HOST: localhost
      REDIS_PORT: "6379"
      JWT_SECRET: ci-test-secret
      PAYMENTS_WEBHOOK_SECRET: ci-test-webhook-secret
      PUBLIC_READ_CACHE_TTL_SECONDS: "60"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - run: npm run build

      - run: npm run lint

      - run: npm test
