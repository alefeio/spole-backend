services:
  api:
    build:
      context: .
    environment:
      PORT: 3000
      NODE_ENV: development
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: spole
      POSTGRES_PASSWORD: spole
      POSTGRES_DB: spole
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      BOOKING_TTL_SECONDS: "1800"
      PAYMENTS_WEBHOOK_SECRET: dev-webhook-secret-change-me
      JWT_SECRET: dev-secret-change-me
      JWT_ISSUER: spole-api
      JWT_AUDIENCE: spole-clients
      JWT_EXPIRES_IN: 7d
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: spole
      POSTGRES_PASSWORD: spole
      POSTGRES_DB: spole
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spole -d spole"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres_data:
  redis_data:
